# Expected outputs for optimus skill tests.
# Used by scripts/test-skills.sh to validate skill execution results.
#
# Format per skill:
#   <skill-name>:
#     <fixture-name>:
#       files_exist: [list of files that must exist after skill runs]
#       files_contain:
#         <file-path>: [list of strings that must appear in file]
#       files_not_exist: [list of files that must NOT exist]
#       output_contains: [list of strings in claude stdout]
#       files_not_modified: true  # assert no files changed (read-only skills)
#
# Paths are relative to the fixture project root.
# Assertions are structural (files exist, stable markers) — never pin template
# prose, which couples the E2E suite to wording that should be free to evolve.

init:
  node-project:
    files_exist:
      - .claude/CLAUDE.md
      - .claude/docs/coding-guidelines.md
      - .claude/.optimus-version

  python-project:
    files_exist:
      - .claude/CLAUDE.md
      - .claude/docs/coding-guidelines.md
      - .claude/.optimus-version

  go-project:
    files_exist:
      - .claude/CLAUDE.md
      - .claude/docs/coding-guidelines.md
      - .claude/.optimus-version

  rust-project:
    files_exist:
      - .claude/CLAUDE.md
      - .claude/docs/coding-guidelines.md
      - .claude/.optimus-version

  csharp-project:
    files_exist:
      - .claude/CLAUDE.md
      - .claude/docs/coding-guidelines.md
      - .claude/.optimus-version

  monorepo-project:
    files_exist:
      - .claude/CLAUDE.md
      - .claude/docs/coding-guidelines.md
      - .claude/.optimus-version

  empty-project:
    # Empty project triggers scaffolding prompt — init may or may not create files
    # depending on Claude's decision. Just check it doesn't crash.
    files_exist: []
